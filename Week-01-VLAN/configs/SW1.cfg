!
! SW1 Configuration - Lab 01: Basic VLAN Configuration
! Device: Cisco IOSv-L2
! Role: Access/Distribution Switch
!

version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname SW1
!
no ip domain-lookup
!
! VLAN Database
vlan 10
 name SALES
vlan 20
 name ENGINEERING
vlan 99
 name NATIVE
!
! Interface Configuration
!
interface GigabitEthernet0/0
 description Trunk to SW2 - 802.1Q
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,99
 no shutdown
!
interface GigabitEthernet0/1
 description PC1 - Sales Department - VLAN 10
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet0/2
 description PC2 - Engineering Department - VLAN 20
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 no shutdown
!
! Unused interfaces - administratively shutdown for security
interface range GigabitEthernet0/3 - 3
 shutdown
!
! Enable CDP for neighbor discovery
cdp run
!
! Enable LLDP
lldp run
!
! Console logging synchronous for easier lab work
line con 0
 logging synchronous
 exec-timeout 0 0
!
end
