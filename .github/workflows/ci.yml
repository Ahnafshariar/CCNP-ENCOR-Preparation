name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # adds a "Run workflow" button in the Actions tab

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    # Skip the run the bot itself triggers, to avoid a loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Regenerate lab index + repo tree
        run: python tools/update_index.py

      - name: Commit updated README (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add README.md
            git commit -m "docs: auto-update lab index + repo tree [skip ci]"
            git push
          else
            echo "README already up to date."
          fi