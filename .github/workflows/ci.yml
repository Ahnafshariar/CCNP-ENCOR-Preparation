name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # adds a "Run workflow" button in the Actions tab

permissions:
  contents: write

jobs:
  lint-and-index:
    runs-on: ubuntu-latest
    # Skip the run that the bot itself triggers, to avoid an infinite loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node (for markdown lint)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint Markdown
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules"
        continue-on-error: true   # report problems but don't block; flip to false later

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate lab index
        run: python tools/update_index.py

      - name: Commit updated index (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add README.md
            git commit -m "docs: auto-update lab index [skip ci]"
            git push
          else
            echo "Lab index already up to date."
          fi
